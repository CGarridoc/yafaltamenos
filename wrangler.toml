# ─────────────────────────────────────────────────────────
# wrangler.toml · YaFaltaMenos.cl
# Cloudflare Workers — sitio estático + Worker para /og-image
# ─────────────────────────────────────────────────────────

name               = "yafaltamenos"
compatibility_date = "2025-01-01"

# Punto de entrada: el Worker que enruta /og-image y delega
# el resto al binding ASSETS (archivos estáticos del repo).
main = "worker.js"

# Sirve todos los archivos estáticos del directorio raíz.
# El Worker los alcanza vía env.ASSETS.fetch(request).
[assets]
directory             = "."
not_found_handling    = "404-page"

# ── KV: encuesta de votos ──────────────────────────────────────────────
# Crear el namespace: wrangler kv:namespace create VOTES
# Reemplaza el id con el valor que devuelve ese comando.
[[kv_namespaces]]
binding = "VOTES"
id      = "adcca4998c694f20854fb187f39e6c00"
